<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Iloncha O'yini</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #fff;
        overflow: hidden;
        touch-action: none;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 400px;
        padding: 10px 20px;
        margin-bottom: 10px;
    }

    .score-box {
        background: rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 8px 16px;
        text-align: center;
    }

    .score-box .label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(255,255,255,0.6);
    }

    .score-box .value {
        font-size: 24px;
        font-weight: 700;
        color: #0f0;
    }

    .score-box .value.high {
        color: #ffd700;
    }

    #gameCanvas {
        border-radius: 16px;
        background: #16213e;
        box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        display: block;
    }

    .controls {
        display: grid;
        grid-template-areas:
            ". up ."
            "left . right"
            ". down .";
        gap: 8px;
        margin-top: 20px;
    }

    .controls button {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        border: none;
        background: rgba(255,255,255,0.1);
        color: #fff;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
        -webkit-tap-highlight-color: transparent;
    }

    .controls button:active {
        background: rgba(0, 255, 0, 0.3);
    }

    .btn-up { grid-area: up; }
    .btn-down { grid-area: down; }
    .btn-left { grid-area: left; }
    .btn-right { grid-area: right; }

    .overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.7);
        border-radius: 16px;
        gap: 16px;
    }

    .overlay h2 {
        font-size: 28px;
        font-weight: 800;
    }

    .overlay .final-score {
        font-size: 18px;
        color: rgba(255,255,255,0.7);
    }

    .play-btn {
        padding: 14px 40px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(135deg, #00c853, #00e676);
        color: #1a1a2e;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s;
    }

    .play-btn:active {
        transform: scale(0.95);
    }

    .game-wrapper {
        position: relative;
    }

    .emoji-food {
        font-size: 14px;
    }
</style>
</head>
<body>
<div class="header">
    <div class="score-box">
        <div class="label">Ball</div>
        <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
        <div class="label">Rekord</div>
        <div class="value high" id="highScore">0</div>
    </div>
</div>

<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="overlay" id="overlay">
        <h2 id="overlayTitle">🐍 Iloncha O'yini</h2>
        <p class="final-score" id="overlayMessage">Tayyor bo'lsangiz boshlang!</p>
        <button class="play-btn" id="playBtn">Boshlash</button>
    </div>
</div>

<div class="controls">
    <button class="btn-up" ontouchstart="changeDir('up')" onclick="changeDir('up')">▲</button>
    <button class="btn-left" ontouchstart="changeDir('left')" onclick="changeDir('left')">◀</button>
    <button class="btn-right" ontouchstart="changeDir('right')" onclick="changeDir('right')">▶</button>
    <button class="btn-down" ontouchstart="changeDir('down')" onclick="changeDir('down')">▼</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayMessage = document.getElementById('overlayMessage');
    const playBtn = document.getElementById('playBtn');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');

    const GRID = 20;
    let cellSize;
    let snake, food, direction, nextDirection, score, highScore, speed, gameLoop, state;

    function resize() {
        const maxSize = Math.min(window.innerWidth - 40, 400);
        canvas.width = maxSize;
        canvas.height = maxSize;
        cellSize = maxSize / GRID;
    }

    resize();
    window.addEventListener('resize', resize);

    highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
    highScoreEl.textContent = highScore;

    function init() {
        const mid = Math.floor(GRID / 2);
        snake = [
            { x: mid, y: mid },
            { x: mid - 1, y: mid },
            { x: mid - 2, y: mid }
        ];
        direction = 'right';
        nextDirection = 'right';
        score = 0;
        speed = 150;
        scoreEl.textContent = '0';
        spawnFood();
    }

    function spawnFood() {
        let pos;
        do {
            pos = {
                x: Math.floor(Math.random() * GRID),
                y: Math.floor(Math.random() * GRID)
            };
        } while (snake.some(s => s.x === pos.x && s.y === pos.y));
        food = pos;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // grid
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= GRID; i++) {
            ctx.beginPath();
            ctx.moveTo(i * cellSize, 0);
            ctx.lineTo(i * cellSize, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * cellSize);
            ctx.lineTo(canvas.width, i * cellSize);
            ctx.stroke();
        }

        // snake
        snake.forEach((seg, i) => {
            const ratio = 1 - (i / snake.length) * 0.5;
            const r = Math.round(0 * ratio);
            const g = Math.round(220 * ratio);
            const b = Math.round(50 * ratio);
            ctx.fillStyle = `rgb(${r},${g},${b})`;

            const padding = i === 0 ? 0.5 : 1;
            const radius = i === 0 ? cellSize * 0.4 : cellSize * 0.3;

            roundRect(
                ctx,
                seg.x * cellSize + padding,
                seg.y * cellSize + padding,
                cellSize - padding * 2,
                cellSize - padding * 2,
                radius
            );

            if (i === 0) {
                ctx.fillStyle = '#fff';
                let ex1, ey1, ex2, ey2;
                const cs = cellSize;
                const cx = seg.x * cs + cs / 2;
                const cy = seg.y * cs + cs / 2;

                if (direction === 'right' || direction === 'left') {
                    ex1 = cx; ey1 = cy - cs * 0.15;
                    ex2 = cx; ey2 = cy + cs * 0.15;
                } else {
                    ex1 = cx - cs * 0.15; ey1 = cy;
                    ex2 = cx + cs * 0.15; ey2 = cy;
                }
                ctx.beginPath();
                ctx.arc(ex1, ey1, cs * 0.08, 0, Math.PI * 2);
                ctx.arc(ex2, ey2, cs * 0.08, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        // food
        ctx.fillStyle = '#ff1744';
        ctx.shadowColor = '#ff1744';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(
            food.x * cellSize + cellSize / 2,
            food.y * cellSize + cellSize / 2,
            cellSize * 0.35, 0, Math.PI * 2
        );
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
        ctx.fill();
    }

    function tick() {
        direction = nextDirection;
        const head = { ...snake[0] };

        switch (direction) {
            case 'up': head.y--; break;
            case 'down': head.y++; break;
            case 'left': head.x--; break;
            case 'right': head.x++; break;
        }

        if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
            return gameOver();
        }

        if (snake.some((s, i) => i < snake.length - 1 && s.x === head.x && s.y === head.y)) {
            return gameOver();
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score += 10;
            scoreEl.textContent = score;
            spawnFood();
            if (score % 50 === 0 && speed > 60) {
                speed -= 10;
                clearInterval(gameLoop);
                gameLoop = setInterval(() => { tick(); draw(); }, speed);
            }
        } else {
            snake.pop();
        }

        draw();
    }

    function gameOver() {
        clearInterval(gameLoop);
        state = 'over';
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('snakeHighScore', highScore);
            highScoreEl.textContent = highScore;
        }
        overlayTitle.textContent = '💀 O\'yin Tugadi!';
        overlayMessage.textContent = `Ballingiz: ${score}`;
        playBtn.textContent = 'Qaytadan';
        overlay.style.display = 'flex';
    }

    function startGame() {
        init();
        overlay.style.display = 'none';
        state = 'playing';
        draw();
        gameLoop = setInterval(() => { tick(); }, speed);
    }

    playBtn.addEventListener('click', startGame);

    function changeDir(dir) {
        if (state !== 'playing') return;
        const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
        if (dir !== opposites[direction]) {
            nextDirection = dir;
        }
    }

    document.addEventListener('keydown', (e) => {
        const keyMap = {
            ArrowUp: 'up', ArrowDown: 'down',
            ArrowLeft: 'left', ArrowRight: 'right',
            w: 'up', s: 'down', a: 'left', d: 'right'
        };
        if (keyMap[e.key]) {
            e.preventDefault();
            changeDir(keyMap[e.key]);
        }
    });

    // Swipe support
    let touchStartX, touchStartY;
    document.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        if (!touchStartX) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;

        if (Math.abs(dx) > Math.abs(dy)) {
            changeDir(dx > 0 ? 'right' : 'left');
        } else {
            changeDir(dy > 0 ? 'down' : 'up');
        }
        touchStartX = null;
    }, { passive: true });

    init();
    draw();
</script>
</body>
</html>
