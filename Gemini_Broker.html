<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Broker Pro v10.4 | Live Search Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(10, 15, 28, 0.96);
            --glass-border: rgba(16, 185, 129, 0.2);
            --emerald: #10b981;
            --indigo: #6366f1;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top left, #064e3b, #020617 50%, #010409); color: #f8fafc; height: 100vh; overflow: hidden; margin: 0; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(40px) saturate(180%); border: 1px solid var(--glass-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, var(--emerald), var(--indigo)); border-radius: 10px; }
        .animate-in { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-glow { transition: all 0.3s ease; }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); transform: translateY(-2px); }
        .btn-glow:active { transform: translateY(1px); }
        .status-pulse { animation: pulse 2.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--emerald); } 50% { opacity: 0.5; box-shadow: 0 0 20px var(--emerald); } }
        .circle-progress { transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1); stroke-dasharray: 251.2; }

        .tooltip { position: relative; display: inline-block; }
        .tooltip .tooltiptext { visibility: hidden; width: max-content; background-color: #1e293b; color: #fff; text-align: center; border-radius: 6px; padding: 4px 8px; position: absolute; z-index: 1; bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s; font-size: 10px; font-weight: bold; border: 1px solid #334155; }
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }
    </style>
</head>
<body>
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useReducer } = React;

        const CONFIG = { STORAGE_KEY: 'aibroker_v10_enterprise' };

        const INITIAL_STATE = {
            messages: [{
                id: 'sys-1',
                type: 'system',
                text: "ULTIMATE ENTERPRISE v10.4 ONLINE.\nAuto-Discovery moduli + Jonli Qidiruv (Google Search) + Hisobotlarni yuklab olish + Telegram botga uzatish funksiyasi faol.",
                time: new Date()
            }],
            input: '', isLoading: false, attachedFile: null, showSettings: false,
            winRate: 0, scoreCard: 0,
            config: { apiKey: '', tgToken: '', tgChatId: '' }
        };

        const reducer = (state, action) => {
            switch (action.type) {
                case 'SET_INPUT': return { ...state, input: action.payload };
                case 'ADD_MESSAGE': return { ...state, messages: [...state.messages, action.payload] };
                case 'DELETE_MESSAGE': return { ...state, messages: state.messages.filter(m => m.id !== action.payload) };
                case 'SET_LOADING': return { ...state, isLoading: action.payload };
                case 'SET_FILE': return { ...state, attachedFile: action.payload };
                case 'TOGGLE_SETTINGS': return { ...state, showSettings: !state.showSettings };
                case 'UPDATE_CONFIG': return { ...state, config: { ...state.config, ...action.payload } };
                case 'UPDATE_METRICS': return { ...state, winRate: action.payload.winRate, scoreCard: action.payload.scoreCard };
                default: return state;
            }
        };

        const App = () => {
            const [state, dispatch] = useReducer(reducer, INITIAL_STATE);
            const chatEndRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
                if (saved) dispatch({ type: 'UPDATE_CONFIG', payload: JSON.parse(saved) });
                lucide.createIcons();
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                lucide.createIcons();
            }, [state.messages, state.isLoading]);

            const exportPDF = (text) => {
                const element = document.createElement('div');
                element.innerHTML = `
                    <div style="font-family: Arial, sans-serif; padding: 30px; color: #1e293b;">
                        <h2 style="color: #047857; border-bottom: 2px solid #047857; padding-bottom: 10px; margin-bottom: 20px;">AI Broker Pro - Rasmiy Hisobot</h2>
                        <div style="white-space: pre-wrap; line-height: 1.6; font-size: 14px;">${text}</div>
                        <p style="margin-top: 40px; font-size: 12px; color: #64748b; text-align: right;">Generatsiya qilingan vaqt: ${new Date().toLocaleString()}</p>
                    </div>
                `;
                html2pdf().set({
                    margin: 10,
                    filename: `Tender_Hisoboti_${Date.now()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                }).from(element).save();
            };

            const exportData = (type, text) => {
                let content = '';
                let mimeType = '';
                let extension = '';
                const formattedText = text.replace(/\n/g, '<br>');

                if (type === 'csv') {
                    content = text.split('\n').map(row => `"${row.replace(/"/g, '""')}"`).join('\n');
                    mimeType = 'text/csv;charset=utf-8;';
                    extension = 'csv';
                } else if (type === 'word') {
                    content = `<html xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"></head><body>${formattedText}</body></html>`;
                    mimeType = 'application/msword;charset=utf-8;';
                    extension = 'doc';
                } else if (type === 'excel') {
                    content = `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table>${text.split('\n').map(r => `<tr><td>${r}</td></tr>`).join('')}</table></body></html>`;
                    mimeType = 'application/vnd.ms-excel;charset=utf-8;';
                    extension = 'xls';
                }

                if (content) {
                    const blob = new Blob(['\ufeff', content], { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Tender_Hisoboti_${Date.now()}.${extension}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            };

            const handlePrint = (text) => {
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                        <head>
                            <title>Hisobotni Chop Etish</title>
                            <style>
                                body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 40px; color: #000; }
                                h1 { border-bottom: 2px solid #000; padding-bottom: 10px; }
                                pre { white-space: pre-wrap; font-family: inherit; line-height: 1.6; }
                                @media print { button { display: none; } }
                            </style>
                        </head>
                        <body>
                            <h1>Tender va Xaridlar Tahlili</h1>
                            <pre>${text}</pre>
                            <script>
                                window.onload = function() { window.print(); window.close(); }
                            <\/script>
                        </body>
                    </html>
                `);
                printWindow.document.close();
            };

            const sendToTelegram = async (text) => {
                let { tgToken, tgChatId } = state.config;
                if (!tgToken || !tgChatId) {
                    alert("Telegram konfiguratsiyasi topilmadi. Iltimos, CONFIG bo'limidan Bot Token va Chat ID kiriting.");
                    return;
                }

                tgChatId = tgChatId.toString().replace(/\s+/g, '');
                tgToken = tgToken.trim();

                const url = `https://api.telegram.org/bot${tgToken}/sendMessage`;

                let safeText = text.replace(/<[^>]*>?/gm, '');
                safeText = safeText.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

                if(safeText.length > 3900) {
                    safeText = safeText.substring(0, 3900) + '\n\n... [Matn juda uzun. To\'liq versiyani PDF orqali yuklab oling]';
                }

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: tgChatId,
                            text: `📄 <b>AI Broker Pro Hisoboti:</b>\n\n${safeText}`,
                            parse_mode: 'HTML'
                        })
                    });

                    const data = await response.json();
                    if (data.ok) {
                        alert("Hisobot Telegram'ga muvaffaqiyatli jo'natildi!");
                    } else {
                        throw new Error(`${data.description}`);
                    }
                } catch (error) {
                    alert(`TELEGRAM XATOSI: ${error.message}\n\nMUHIM YECHIM: Iltimos, Telegramga kiring, BotFather orqali o'zingiz yaratgan botingizni qidirib toping va unga bir marta /start yuboring. Hech qaysi bot foydalanuvchiga birinchi bo'lib yozish huquqiga ega emas! Shundan so'ng qayta urinib ko'ring.`);
                }
            };

            const callGemini = async (prompt, fileData) => {
                if (!state.config.apiKey) return "CRITICAL ERROR: API Key kiritilmagan. Sozlamalarni tekshiring.";

                let resolvedModel = "models/gemini-1.5-flash";
                try {
                    const listResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${state.config.apiKey}`);
                    const listData = await listResponse.json();

                    if (listData.models) {
                        const validModels = listData.models.filter(m => m.supportedGenerationMethods?.includes('generateContent'));
                        const modelNames = validModels.map(m => m.name);

                        // Ovozli qidiruv va Grounding asosan 1.5-flash va undan yuqorilarida ishlaydi
                        if (modelNames.includes('models/gemini-2.5-flash')) {
                            resolvedModel = 'models/gemini-2.5-flash';
                        } else if (modelNames.includes('models/gemini-1.5-flash')) {
                            resolvedModel = 'models/gemini-1.5-flash';
                        } else if (modelNames.includes('models/gemini-1.5-pro')) {
                            resolvedModel = 'models/gemini-1.5-pro';
                        } else if (modelNames.includes('models/gemini-1.5-flash-8b')) {
                            resolvedModel = 'models/gemini-1.5-flash-8b';
                        } else if (modelNames.length > 0) {
                            resolvedModel = modelNames[0];
                        }
                    }
                } catch (discoveryError) {
                    console.warn("Auto-discovery xatosi:", discoveryError);
                }

                const URL = `https://generativelanguage.googleapis.com/v1beta/${resolvedModel}:generateContent?key=${state.config.apiKey}`;

                const currentParts = [];

                const fullPrompt = `Sen O'zbekistondagi tender va xaridlar bo'yicha professional tahlilchisan.

QAT'IY TALAB: Javobingni eng boshida har doim hujjatga yoki so'rovga oid quyidagi ma'lumotlarni alohida blokda ko'rsat (agar ma'lumot topilmasa "Mavjud emas" deb yoz):
📌 Manba: [qaysi tashkilot yoki platformadan olinganligi]
🌐 Veb-sayt: [sayt manzili yoki havola]
📅 Olingan vaqti: [joriy kun yoki hujjatdagi sana]
📞 Telefon: [sotuvchi/tashkilot bilan bog'lanish telefoni]
🤝 Sotuvchi: [mas'ul shaxs yoki kompaniya rekvizitlari]

Shundan so'ng batafsil va tuzilmali tahlilni taqdim et. Tahlil davomida kerak bo'lsa internetdan jonli qidirib, real narxlar va aloqa vositalarini topishga harakat qil.
So'rov: ${prompt}

ENG OXIRIDA FAQAT SHU FORMATDA METRIKA QO'SH:
[METRICS]{"winRate": 85, "scoreCard": 92}[/METRICS]`;

                currentParts.push({ text: fullPrompt });

                if (fileData) {
                    currentParts.push({ inline_data: { mime_type: fileData.mimeType, data: fileData.base64 } });
                }

                try {
                    const response = await fetch(URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // MANA SHU YERGA JONLI QIDIRUV (GOOGLE SEARCH GROUNDING) QO'SHILDI
                        body: JSON.stringify({
                            contents: [{ role: 'user', parts: currentParts }],
                            generationConfig: { temperature: 0.5 },
                            tools: [{ googleSearch: {} }]
                        })
                    });

                    const data = await response.json();

                    if (!response.ok || data.error) throw new Error(data.error?.message || "Tizim xatosi.");

                    let aiText = data.candidates[0].content.parts[0].text;

                    const metricsRegex = /\[METRICS\](.*?)\[\/METRICS\]/s;
                    const match = aiText.match(metricsRegex);

                    if (match) {
                        try {
                            const metrics = JSON.parse(match[1]);
                            dispatch({ type: 'UPDATE_METRICS', payload: { winRate: metrics.winRate || 65, scoreCard: metrics.scoreCard || 80 } });
                            aiText = aiText.replace(metricsRegex, '').trim();
                        } catch (e) {}
                    }
                    return `(Model: ${resolvedModel} + Live Search)\n\n${aiText}`;
                } catch (err) {
                    return `XATOLIK YUZ BERDI: ${err.message}`;
                }
            };

            const handleSend = async () => {
                if (!state.input.trim() && !state.attachedFile) return;

                const userMsg = { id: Date.now().toString(), type: 'user', text: state.attachedFile ? `[PDF Biriktirildi: ${state.attachedFile.name}]\n${state.input}` : state.input, time: new Date() };
                dispatch({ type: 'ADD_MESSAGE', payload: userMsg });

                const p = state.input || "Ushbu ma'lumotlarni tahlil qiling. Barcha kontakt va manba ma'lumotlarini ajratib ko'rsating.";
                const f = state.attachedFile;

                dispatch({ type: 'SET_INPUT', payload: '' });
                dispatch({ type: 'SET_FILE', payload: null });
                dispatch({ type: 'SET_LOADING', payload: true });

                const res = await callGemini(p, f);

                dispatch({ type: 'ADD_MESSAGE', payload: { id: (Date.now()+1).toString(), type: 'bot', text: res, time: new Date() } });
                dispatch({ type: 'SET_LOADING', payload: false });
            };

            const handleFile = (e) => {
                const f = e.target.files[0];
                if (!f) return;
                if (f.type === "application/pdf") {
                    const r = new FileReader();
                    r.onload = () => dispatch({ type: 'SET_FILE', payload: { name: f.name, mimeType: f.type, base64: r.result.split(',')[1] } });
                    r.readAsDataURL(f);
                } else alert("Faqat PDF hujjat yuklang.");
            };

            return (
                <div className="flex h-full p-4 lg:p-6 gap-6 relative">
                    {state.showSettings && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md p-4 animate-in">
                            <div className="glass-panel p-8 rounded-[2.5rem] w-full max-w-md space-y-6">
                                <h2 className="text-2xl font-black text-emerald-400 flex items-center gap-3"><i data-lucide="settings-2"></i> SOZLAMALAR</h2>
                                <div className="space-y-4">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Gemini API Key</label>
                                    <input type="password" value={state.config.apiKey} onChange={e => dispatch({ type: 'UPDATE_CONFIG', payload: { apiKey: e.target.value } })} className="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-emerald-500 text-xs font-mono" placeholder="AIzaSy..."/>

                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 mt-4 block">Telegram Bot Token</label>
                                    <input type="password" value={state.config.tgToken} onChange={e => dispatch({ type: 'UPDATE_CONFIG', payload: { tgToken: e.target.value } })} className="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-emerald-500 text-xs font-mono" placeholder="BotFather bergan token..."/>

                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 mt-4 block">Telegram Chat ID</label>
                                    <input type="text" value={state.config.tgChatId} onChange={e => dispatch({ type: 'UPDATE_CONFIG', payload: { tgChatId: e.target.value } })} className="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-emerald-500 text-xs font-mono" placeholder="Guruh yoki user ID'si..."/>
                                </div>
                                <button onClick={() => { localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(state.config)); dispatch({ type: 'TOGGLE_SETTINGS' }); }} className="w-full bg-emerald-600 p-5 rounded-2xl font-black uppercase tracking-widest btn-glow text-xs">SAQLASH VA CHIQISH</button>
                            </div>
                        </div>
                    )}

                    <aside className="w-80 glass-panel rounded-[2.5rem] p-8 flex flex-col gap-8 no-print transition-all">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 bg-emerald-600 rounded-2xl flex items-center justify-center status-pulse shadow-xl shadow-emerald-500/30"><i data-lucide="radar" className="text-white w-7 h-7"></i></div>
                            <div>
                                <h1 className="font-black text-2xl tracking-tighter leading-none">BROKER</h1>
                                <span className="text-emerald-500 text-[10px] uppercase font-bold tracking-[0.2em]">Enterprise v10.4</span>
                            </div>
                        </div>

                        <div className="flex-1 space-y-8 overflow-y-auto custom-scrollbar">
                            <div className="bg-slate-900/80 p-6 rounded-[2rem] border border-slate-800 flex flex-col items-center relative overflow-hidden shadow-inner">
                                <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">G'alaba Ehtimoli</p>
                                <div className="relative w-32 h-32 flex items-center justify-center">
                                    <svg className="w-full h-full transform -rotate-90 drop-shadow-2xl">
                                        <circle cx="64" cy="64" r="40" stroke="rgba(15, 23, 42, 0.8)" strokeWidth="8" fill="transparent" />
                                        <circle cx="64" cy="64" r="40" stroke="currentColor" strokeWidth="8" fill="transparent" className="text-emerald-500 circle-progress" style={{ strokeDashoffset: 251.2 - (251.2 * state.winRate) / 100 }} />
                                    </svg>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center"><span className="text-3xl font-black text-white">{state.winRate}%</span></div>
                                </div>
                            </div>

                            <button onClick={() => fileInputRef.current.click()} className="w-full p-6 bg-slate-900 border border-slate-800 rounded-3xl flex flex-col items-center gap-3 hover:border-emerald-500 transition-all btn-glow text-emerald-500">
                                <i data-lucide="file-up" className="w-8 h-8"></i>
                                <span className="text-[10px] font-black uppercase tracking-widest">Tender PDF Yuklash</span>
                            </button>
                            <input type="file" ref={fileInputRef} onChange={handleFile} className="hidden" accept=".pdf" />
                        </div>
                        <button onClick={() => dispatch({ type: 'TOGGLE_SETTINGS' })} className="p-5 bg-slate-900 hover:bg-emerald-600 hover:text-white rounded-3xl font-black text-[10px] uppercase transition-all flex items-center justify-center gap-3 text-slate-400"><i data-lucide="settings" className="w-4 h-4"></i> CONFIG</button>
                    </aside>

                    <main className="flex-1 flex flex-col gap-6 relative">
                        <header className="glass-panel h-20 rounded-[2.5rem] flex items-center justify-between px-8">
                            <div className="flex items-center gap-4">
                                <div className="w-3 h-3 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></div>
                                <h2 className="font-black text-lg tracking-tight uppercase">Analitika va Hisobotlar</h2>
                            </div>
                            <div className="p-3 bg-slate-900/80 rounded-xl text-[10px] font-black text-emerald-500 border border-slate-800 tracking-widest flex gap-2">
                                <i data-lucide="download-cloud" className="w-3 h-3"></i> MULTI-EXPORT
                            </div>
                        </header>

                        <div className="flex-1 glass-panel rounded-[3rem] p-8 overflow-y-auto custom-scrollbar space-y-8">
                            {state.messages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.type === 'user' ? 'justify-end' : 'justify-start'} animate-in`}>
                                    <div className={`max-w-[85%] p-6 lg:p-8 rounded-[2rem] shadow-2xl relative group ${msg.type === 'user' ? 'bg-indigo-600 rounded-tr-none' : 'bg-slate-900 border border-slate-800 rounded-tl-none'}`}>
                                        <div className="flex justify-between items-center mb-4 opacity-40 text-[9px] font-black uppercase tracking-widest">
                                            <span>{msg.type === 'bot' ? 'Broker AI Analizi' : 'Foydalanuvchi'}</span>
                                            <span>{msg.time.toLocaleTimeString()}</span>
                                        </div>
                                        <div className="text-[15px] font-medium leading-relaxed whitespace-pre-wrap">{msg.text}</div>

                                        <div className="mt-5 pt-4 border-t border-slate-700/50 flex flex-wrap gap-2 justify-end opacity-20 group-hover:opacity-100 transition-opacity duration-300">
                                            {msg.type === 'bot' && (
                                                <>
                                                    <div className="tooltip"><button onClick={() => exportPDF(msg.text)} className="p-2.5 bg-slate-800 hover:bg-red-500 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="file-text" className="w-4 h-4"></i></button><span className="tooltiptext">PDF yuklash</span></div>
                                                    <div className="tooltip"><button onClick={() => exportData('word', msg.text)} className="p-2.5 bg-slate-800 hover:bg-blue-500 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="file" className="w-4 h-4"></i></button><span className="tooltiptext">Word yuklash</span></div>
                                                    <div className="tooltip"><button onClick={() => exportData('excel', msg.text)} className="p-2.5 bg-slate-800 hover:bg-emerald-500 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="table" className="w-4 h-4"></i></button><span className="tooltiptext">Excel yuklash</span></div>
                                                    <div className="tooltip"><button onClick={() => exportData('csv', msg.text)} className="p-2.5 bg-slate-800 hover:bg-yellow-600 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="file-spreadsheet" className="w-4 h-4"></i></button><span className="tooltiptext">CSV yuklash</span></div>
                                                    <div className="tooltip"><button onClick={() => handlePrint(msg.text)} className="p-2.5 bg-slate-800 hover:bg-indigo-500 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="printer" className="w-4 h-4"></i></button><span className="tooltiptext">Chop etish</span></div>
                                                    <div className="tooltip"><button onClick={() => sendToTelegram(msg.text)} className="p-2.5 bg-slate-800 hover:bg-sky-500 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="send" className="w-4 h-4"></i></button><span className="tooltiptext">Telegramga yuborish</span></div>
                                                </>
                                            )}
                                            <div className="tooltip"><button onClick={() => dispatch({ type: 'DELETE_MESSAGE', payload: msg.id })} className="p-2.5 bg-slate-800 hover:bg-red-600 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button><span className="tooltiptext">O'chirish</span></div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {state.isLoading && (
                                <div className="flex gap-2 p-6 bg-emerald-500/10 w-fit rounded-[2rem] border border-emerald-500/20">
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-bounce"></div>
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        <footer className="flex flex-col gap-3">
                            {state.attachedFile && (
                                <div className="mx-8 p-4 bg-slate-900/80 border border-emerald-500/30 rounded-2xl flex justify-between items-center text-xs font-bold text-emerald-400 animate-in backdrop-blur-md">
                                    <span className="flex items-center gap-3"><i data-lucide="file-text"></i> {state.attachedFile.name}</span>
                                    <button onClick={() => dispatch({ type: 'SET_FILE', payload: null })} className="hover:text-red-500 transition-colors"><i data-lucide="x-circle"></i></button>
                                </div>
                            )}
                            <div className="glass-panel min-h-[6.5rem] rounded-[2.5rem] p-4 flex gap-4 items-center px-8 border-t border-slate-800">
                                <button onClick={() => fileInputRef.current.click()} className="p-4 bg-slate-800 rounded-2xl hover:bg-emerald-600 transition-all text-slate-400 hover:text-white"><i data-lucide="paperclip" className="w-5 h-5"></i></button>
                                <textarea value={state.input} onChange={e => dispatch({ type: 'SET_INPUT', payload: e.target.value })} onKeyPress={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())} className="flex-1 bg-transparent border-none focus:outline-none text-lg font-bold placeholder-slate-700 resize-none py-2 custom-scrollbar" placeholder="Tender bo'yicha buyruq (Barcha metadatalar olinadi)..." />
                                <button onClick={handleSend} disabled={state.isLoading || (!state.input.trim() && !state.attachedFile)} className="h-16 px-10 bg-emerald-600 rounded-[1.5rem] font-black text-xs uppercase tracking-widest btn-glow disabled:opacity-30 disabled:grayscale transition-all flex items-center gap-3">
                                    <span>Tahlil</span> <i data-lucide="send" className="w-4 h-4"></i>
                                </button>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
